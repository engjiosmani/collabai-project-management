components:
  schemas:
    AIRequest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        organization:
          type: integer
          readOnly: true
          nullable: true
        prompt:
          type: string
          readOnly: true
        response:
          type: string
          readOnly: true
        status:
          type: string
          readOnly: true
        task:
          type: integer
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - organization
      - prompt
      - response
      - status
      - task
    AccessTokenResponse:
      type: object
      properties:
        access:
          type: string
      required:
      - access
    ActivityByAction:
      type: object
      properties:
        name:
          type: string
        value:
          type: integer
      required:
      - name
      - value
    ActivityLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        task:
          type: integer
          readOnly: true
        task_title:
          type: string
          readOnly: true
        user:
          type: integer
          readOnly: true
          nullable: true
        user_email:
          type: string
          format: email
          readOnly: true
        action:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - created_at
      - description
      - id
      - task
      - task_title
      - updated_at
      - user
      - user_email
    AddWorkspaceMember:
      type: object
      properties:
        user_id:
          type: integer
        role:
          allOf:
          - $ref: '#/components/schemas/WorkspaceMemberRoleEnum'
          default: member
      required:
      - user_id
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
          nullable: true
        user_email:
          type: string
          format: email
          readOnly: true
        action:
          type: string
          readOnly: true
        entity_name:
          type: string
          readOnly: true
        entity_id:
          type: integer
          readOnly: true
          nullable: true
        metadata:
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - created_at
      - entity_id
      - entity_name
      - id
      - metadata
      - updated_at
      - user
      - user_email
    ChangePassword:
      type: object
      properties:
        old_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
          minLength: 8
        confirm_password:
          type: string
          writeOnly: true
      required:
      - confirm_password
      - new_password
      - old_password
    ChatBotHistoryItem:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/ChatBotHistoryItemRoleEnum'
        content:
          type: string
          maxLength: 8000
      required:
      - content
      - role
    ChatBotHistoryItemRoleEnum:
      enum:
      - user
      - assistant
      type: string
      description: |-
        * `user` - user
        * `assistant` - assistant
    ChatBotRequest:
      type: object
      properties:
        message:
          type: string
          maxLength: 4000
        history:
          type: array
          items:
            $ref: '#/components/schemas/ChatBotHistoryItem'
      required:
      - message
    ChatBotResponse:
      type: object
      properties:
        answer:
          type: string
        request_id:
          type: integer
      required:
      - answer
      - request_id
    Comment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        task:
          type: integer
        task_title:
          type: string
          readOnly: true
        author:
          type: integer
          readOnly: true
        author_email:
          type: string
          format: email
          readOnly: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - author
      - author_email
      - content
      - created_at
      - id
      - task
      - task_title
      - updated_at
    DashboardSummary:
      type: object
      properties:
        total_projects:
          type: integer
        total_tasks:
          type: integer
        completed_tasks:
          type: integer
        pending_tasks:
          type: integer
        total_activity_logs:
          type: integer
        recent_activity:
          type: array
          items:
            type: object
            additionalProperties: {}
        activity_by_action:
          type: array
          items:
            $ref: '#/components/schemas/ActivityByAction'
      required:
      - activity_by_action
      - completed_tasks
      - pending_tasks
      - recent_activity
      - total_activity_logs
      - total_projects
      - total_tasks
    DetailResponse:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    ForgotPassword:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        timestamp:
          type: string
          format: date-time
        database:
          type: string
        groq_configured:
          type: boolean
      required:
      - database
      - groq_configured
      - status
      - timestamp
    JobRole:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          readOnly: true
        name:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        task_categories:
          readOnly: true
          description: AI task categories this role typically owns (e.g. backend,
            api, auth).
        is_active:
          type: boolean
          readOnly: true
      required:
      - code
      - description
      - id
      - is_active
      - name
      - task_categories
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    LogoutRequest:
      type: object
      properties:
        refresh:
          type: string
      required:
      - refresh
    Membership:
      type: object
      properties:
        organization:
          allOf:
          - $ref: '#/components/schemas/MembershipOrganization'
          readOnly: true
        role:
          type: string
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/MembershipWorkspace'
          readOnly: true
      required:
      - organization
      - role
      - workspaces
    MembershipOrganization:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
      - id
      - name
    MembershipWorkspace:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
      required:
      - id
      - name
      - role
    MetricsResponse:
      type: object
      properties:
        users:
          type: integer
        organizations:
          type: integer
        workspaces:
          type: integer
        roles:
          type: integer
        permissions:
          type: integer
        team_members:
          type: integer
        workspace_invites:
          type: integer
        projects:
          type: integer
        tasks:
          type: integer
        comments:
          type: integer
        activity_logs:
          type: integer
        notifications:
          type: integer
      required:
      - activity_logs
      - comments
      - notifications
      - organizations
      - permissions
      - projects
      - roles
      - tasks
      - team_members
      - users
      - workspace_invites
      - workspaces
    ModeEnum:
      enum:
      - summary
      - action_items
      - sentiment
      type: string
      description: |-
        * `summary` - summary
        * `action_items` - action_items
        * `sentiment` - sentiment
    Notification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        organization:
          type: integer
          readOnly: true
          nullable: true
        user_email:
          type: string
          format: email
          readOnly: true
        title:
          type: string
          maxLength: 150
        message:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - message
      - organization
      - title
      - updated_at
      - user
      - user_email
    Organization:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 150
        description:
          type: string
        project_count:
          type: integer
