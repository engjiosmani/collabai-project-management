          - $ref: '#/components/schemas/WorkspaceMemberRoleEnum'
          readOnly: true
        job_role_name:
          type: string
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - id
      - job_role_name
      - role
      - updated_at
      - user_id
      - username
    TextAnalyze:
      type: object
      properties:
        text:
          type: string
          maxLength: 16000
        mode:
          allOf:
          - $ref: '#/components/schemas/ModeEnum'
          default: summary
        task_id:
          type: integer
          nullable: true
      required:
      - text
    TextAnalyzeResponse:
      type: object
      properties:
        mode:
          type: string
        result:
          type: string
        request_id:
          type: integer
      required:
      - mode
      - request_id
      - result
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
      required:
      - refresh
    TokenResponse:
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
          readOnly: true
        profile:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
      required:
      - date_joined
      - email
      - first_name
      - id
      - is_active
      - last_name
      - profile
      - username
    UserMe:
      type: object
      properties:
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        bio:
          type: string
        phone_number:
          type: string
        organization:
          type: integer
          nullable: true
    Workspace:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        organization:
          type: integer
        organization_name:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 150
        is_active:
          type: boolean
        member_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - member_count
      - name
      - organization
      - organization_name
      - updated_at
    WorkspaceInOrg:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 150
        is_active:
          type: boolean
        member_count:
          type: integer
          readOnly: true
          default: 0
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - member_count
      - name
      - updated_at
    WorkspaceMemberRoleEnum:
      enum:
      - workspace_admin
      - manager
      - member
      type: string
      description: |-
        * `workspace_admin` - Workspace Admin
        * `manager` - Manager
        * `member` - Member
    WorkspaceTeamMember:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        workspace:
          type: integer
          readOnly: true
        workspace_name:
          type: string
          readOnly: true
        user:
          type: integer
          readOnly: true
        user_email:
          type: string
          format: email
          readOnly: true
        role:
          $ref: '#/components/schemas/WorkspaceMemberRoleEnum'
        job_role:
          type: integer
          nullable: true
          description: Discipline used for AI task assignment (Backend, Frontend,
            DevOps, …).
        job_role_name:
          type: string
          readOnly: true
          nullable: true
        job_role_code:
          type: string
          readOnly: true
          nullable: true
        task_categories:
          type: array
          items:
            type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - job_role_code
      - job_role_name
      - task_categories
      - updated_at
      - user
      - user_email
      - workspace
      - workspace_name
    ErrorResponse:
      type: object
      description: Standard API error response.
      properties:
        detail:
          type: string
          description: Human-readable error message.
      additionalProperties: true
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
